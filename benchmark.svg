<svg xmlns="http://www.w3.org/2000/svg" width="900" height="395" viewBox="0 0 900 395">
  <!-- Background -->
  <rect width="900" height="395" fill="#ffffff" rx="8" stroke="#d0d7de" stroke-width="1"/>

  <!-- Main Title -->
  <text x="450" y="26" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="14" font-weight="700" fill="#1f2328">
    STM32F407 @ 168 MHz — ADC &amp; Filter Benchmark
  </text>

  <!-- ═══════════════════════════════════════════
       SECTION 1 — ADC Acquisition Cycles
       max=600  bars at x=70,140,210  w=50
       Polling 507  → h=199 y=111
       Interrupt 537 → h=210 y=100
       DMA 558      → h=219 y=91
  ══════════════════════════════════════════════ -->
  <rect x="20" y="38" width="260" height="302" fill="#f6f8fa" rx="6" stroke="#d0d7de" stroke-width="0.5"/>
  <text x="150" y="57" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="600" fill="#1f2328">ADC Acquisition (cycles)</text>

  <line x1="55" x2="270" y1="75"  y2="75"  stroke="#d0d7de" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="55" x2="270" y1="153" y2="153" stroke="#d0d7de" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="55" x2="270" y1="232" y2="232" stroke="#d0d7de" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="55" x2="270" y1="310" y2="310" stroke="#d0d7de" stroke-width="1"/>
  <text x="52" y="79"  text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">600</text>
  <text x="52" y="157" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">400</text>
  <text x="52" y="236" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">200</text>

  <rect x="70"  y="111" width="50" height="199" fill="#1f6feb" rx="3"/>
  <text x="95"  y="107" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="600" fill="#1f2328">507</text>
  <text x="95"  y="326" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">POLLING</text>

  <rect x="140" y="100" width="50" height="210" fill="#8250df" rx="3"/>
  <text x="165" y="96"  text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="600" fill="#1f2328">537</text>
  <text x="165" y="326" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">INTERRUPT</text>

  <rect x="210" y="91"  width="50" height="219" fill="#2da44e" rx="3"/>
  <text x="235" y="87"  text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="600" fill="#1f2328">558</text>
  <text x="235" y="326" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">DMA</text>

  <!-- ═══════════════════════════════════════════
       SECTION 2 — Filter Execution Cycles
       max=180  bars at x=360,430,500  w=50
       IIR 36  → h=47  y=263
       MA  106 → h=138 y=172
       FIR 165 → h=215 y=95
  ══════════════════════════════════════════════ -->
  <rect x="310" y="38" width="260" height="302" fill="#f6f8fa" rx="6" stroke="#d0d7de" stroke-width="0.5"/>
  <text x="440" y="57" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="600" fill="#1f2328">Filter Execution (cycles)</text>

  <line x1="345" x2="560" y1="75"  y2="75"  stroke="#d0d7de" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="345" x2="560" y1="153" y2="153" stroke="#d0d7de" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="345" x2="560" y1="232" y2="232" stroke="#d0d7de" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="345" x2="560" y1="310" y2="310" stroke="#d0d7de" stroke-width="1"/>
  <text x="342" y="79"  text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">180</text>
  <text x="342" y="157" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">120</text>
  <text x="342" y="236" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">60</text>

  <rect x="360" y="263" width="50" height="47"  fill="#cf222e" rx="3"/>
  <text x="385" y="259" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="600" fill="#1f2328">36</text>
  <text x="385" y="326" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">IIR</text>

  <rect x="430" y="172" width="50" height="138" fill="#bf8700" rx="3"/>
  <text x="455" y="168" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="600" fill="#1f2328">106</text>
  <text x="455" y="326" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">MA</text>

  <rect x="500" y="95"  width="50" height="215" fill="#0969da" rx="3"/>
  <text x="525" y="91"  text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="600" fill="#1f2328">165</text>
  <text x="525" y="326" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">FIR</text>

  <!-- ═══════════════════════════════════════════
       SECTION 3 — CPU Availability (bg_counter)
       max=35  bars at x=650,720,790  w=50
       Polling 15   → h=101 y=209
       Interrupt 31 → h=208 y=102
       DMA 32       → h=215 y=95
  ══════════════════════════════════════════════ -->
  <rect x="600" y="38" width="260" height="302" fill="#f6f8fa" rx="6" stroke="#d0d7de" stroke-width="0.5"/>
  <text x="730" y="57" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="600" fill="#1f2328">CPU Availability (bg_counter)</text>

  <line x1="635" x2="850" y1="109" y2="109" stroke="#d0d7de" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="635" x2="850" y1="176" y2="176" stroke="#d0d7de" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="635" x2="850" y1="243" y2="243" stroke="#d0d7de" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="635" x2="850" y1="310" y2="310" stroke="#d0d7de" stroke-width="1"/>
  <text x="632" y="113" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">30</text>
  <text x="632" y="180" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">20</text>
  <text x="632" y="247" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">10</text>

  <rect x="650" y="209" width="50" height="101" fill="#1f6feb" rx="3"/>
  <text x="675" y="205" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="600" fill="#1f2328">15</text>
  <text x="675" y="326" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">POLLING</text>

  <rect x="720" y="102" width="50" height="208" fill="#8250df" rx="3"/>
  <text x="745" y="98"  text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="600" fill="#1f2328">31</text>
  <text x="745" y="326" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">INTERRUPT</text>

  <rect x="790" y="95"  width="50" height="215" fill="#2da44e" rx="3"/>
  <text x="815" y="91"  text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="600" fill="#1f2328">32</text>
  <text x="815" y="326" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#656d76">DMA</text>

  <!-- Footer -->
  <text x="450" y="380" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#656d76">
    Higher bg_counter = more CPU time available while waiting for ADC conversion to finish
  </text>
</svg>
